          type: string
        authors:
          type: string
        abstract:
          type: string
        venue:
          type: string
        year:
          type: integer
        paperLink:
          type: ["string", "null"]
        tags:
          type: string

    Project:
      type: object
      required: [id, title, description, techStack, githubUrl, category]
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        techStack:
          type: string
        githubUrl:
          type: string
        liveDemoUrl:
          type: ["string", "null"]
        category:
          type: string

    ProjectInput:
