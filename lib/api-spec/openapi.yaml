components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    Profile:
      type: object
      required: [id, name, tagline]
      properties:
        id:
          type: integer
        name:
          type: string
        tagline:
          type: string
        profilePictureUrl:
          type: ["string", "null"]
        cvLink:
          type: ["string", "null"]
        bio:
          type: ["string", "null"]
        quote:
          type: ["string", "null"]
        bengaliQuote:
          type: ["string", "null"]

    ProfileInput:
      type: object
      properties:
        name:
          type: string
        tagline:
          type: string
        profilePictureUrl:
          type: ["string", "null"]
        cvLink:
          type: ["string", "null"]
        bio:
          type: ["string", "null"]
        quote:
          type: ["string", "null"]
        bengaliQuote:
          type: ["string", "null"]

    Certificate:
      type: object
      required: [id, title, issuer, date, category]
      properties:
        id:
          type: integer
        title:
          type: string
        issuer:
          type: string
        date:
          type: string
        category:
          type: string
        credentialUrl:
          type: ["string", "null"]

    CertificateInput:
      type: object
      required: [title, issuer, date, category]
      properties:
        title:
          type: string
        issuer:
          type: string
        date:
          type: string
        category:
          type: string
        credentialUrl:
          type: ["string", "null"]

    CertificateUpdate:
      type: object
      properties:
        title:
          type: string
        issuer:
          type: string
        date:
          type: string
        category:
          type: string
        credentialUrl:
          type: ["string", "null"]

    ResearchPaper:
      type: object
      required: [id, title, authors, abstract, venue, year, tags]
      properties:
        id:
          type: integer
        title:
          type: string
        authors:
          type: string
        abstract:
          type: string
        venue:
          type: string
        year:
          type: integer
        paperLink:
          type: ["string", "null"]
        tags:
          type: string

    ResearchPaperInput:
      type: object
      required: [title, authors, abstract, venue, year, tags]
      properties:
        title:
          type: string
        authors:
          type: string
        abstract:
          type: string
        venue:
          type: string
        year:
          type: integer
        paperLink:
          type: ["string", "null"]
        tags:
          type: string

    ResearchPaperUpdate:
      type: object
      properties:
